<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Farmacia</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-light">

<!-- Barra superior -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">

           <img src="/img/logo.png.jpg"
           alt="Logo"
           class="logo-navbar me-2">

            <span>Sistema de Farmacia</span>

        </a>

    </div>
</nav>

<!-- Imagen -->
<div class="text-center mb-4">

   <img src="/img/imagen.jpg"
     alt="Imagen de la farmacia"
     class="imagen-principal">

</div>

    <!-- Formulario -->
    <div class="card shadow-lg border-0 mb-4">

        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">➕ Registrar / Editar Producto</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/guardar}" method="post">

                <input type="hidden" name="id" th:value="${producto.id}">

                <div class="row">

                    <div class="col-md-5 mb-3">
                        <label class="form-label">Nombre</label>

                        <input
                                type="text"
                                class="form-control"
                                name="nombre"
                                th:value="${producto.nombre}"
                                placeholder="Ingrese el nombre"
                                required>
                    </div>

                    <div class="col-md-5 mb-3">
                        <label class="form-label">Precio</label>

                        <input
                                type="number"
                                class="form-control"
                                step="0.01"
                                name="precio"
                                th:value="${producto.precio}"
                                placeholder="Ingrese el precio"
                                required>
                    </div>

                    <div class="col-md-2 d-grid mb-3 align-self-end">

                        <button type="submit" class="btn btn-success">

                            <span th:if="${producto.id == null}">
                                ➕ Agregar
                            </span>

                            <span th:if="${producto.id != null}">
                                ✏ Actualizar
                            </span>

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- Tabla -->
    <div class="card shadow-lg border-0">

        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">📦 Inventario de Productos</h4>
        </div>

        <div class="card-body">

            <table class="table table-hover table-striped text-center align-middle">

                <thead class="table-primary">

                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="p : ${productos}">

                    <td th:text="${p.id}"></td>

                    <td th:text="${p.nombre}"></td>

                    <td>
                        S/ <span th:text="${p.precio}"></span>
                    </td>

                    <td>

                        <a th:href="@{'/editar/' + ${p.id}}"
                           class="btn btn-warning btn-sm">
                            ✏ Editar
                        </a>

                        <a th:href="@{'/eliminar/' + ${p.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Desea eliminar este producto?')">
                            🗑 Eliminar
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
