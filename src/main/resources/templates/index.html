<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Farmacia</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-light">

<!-- Barra superior -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">

            <img src="/img/logo.png.jpg"
                 alt="Logo"
                 class="logo-navbar me-2">

            <span>Sistema de Farmacia</span>

        </a>

    </div>
</nav>

<!-- Imagen -->
<div class="text-center mb-4">

    <img src="/img/imagen.jpg"
         alt="Imagen de la farmacia"
         class="imagen-principal">

</div>

<div class="container">

    <!-- FORMULARIO SOLO PARA ADMIN -->
    <div class="card shadow-lg border-0 mb-4"
         sec:authorize="hasRole('ADMIN')">

        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">💊 Registrar / Editar Medicamento</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/guardar}" method="post">

                <input type="hidden"
                       name="id"
                       th:value="${medicamento.id}">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Nombre</label>

                        <input
                                type="text"
                                class="form-control"
                                name="nombre"
                                th:value="${medicamento.nombre}"
                                placeholder="Ingrese el nombre"
                                required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Descripción</label>

                        <input
                                type="text"
                                class="form-control"
                                name="descripcion"
                                th:value="${medicamento.descripcion}"
                                placeholder="Descripción">
                    </div>

                    <div class="col-md-2 mb-3">
                        <label class="form-label">Precio</label>

                        <input
                                type="number"
                                step="0.01"
                                class="form-control"
                                name="precio"
                                th:value="${medicamento.precio}"
                                required>
                    </div>

                    <div class="col-md-2 mb-3">
                        <label class="form-label">Stock</label>

                        <input
                                type="number"
                                class="form-control"
                                name="stock"
                                th:value="${medicamento.stock}"
                                required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Categoría</label>

                        <input
                                type="text"
                                class="form-control"
                                name="categoria"
                                th:value="${medicamento.categoria}">
                    </div>

                    <div class="col-md-6 d-grid align-self-end">

                        <button type="submit" class="btn btn-success">

                            <span th:if="${medicamento.id == null}">
                                ➕ Agregar Medicamento
                            </span>

                            <span th:if="${medicamento.id != null}">
                                ✏ Actualizar Medicamento
                            </span>

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- BUSCADOR -->
    <div class="card shadow-sm border-0 mb-4">

        <div class="card-body">

            <form th:action="@{/buscar}" method="get">

                <div class="row">

                    <div class="col-md-9">

                        <input
                                type="text"
                                class="form-control"
                                name="nombre"
                                placeholder="🔍 Buscar medicamento por nombre..."
                                required>

                    </div>

                    <div class="col-md-2 d-grid">

                        <button class="btn btn-primary" type="submit">
                            Buscar
                        </button>

                    </div>

                    <div class="col-md-1 d-grid">

                        <a th:href="@{/}" class="btn btn-secondary">
                            Todos
                        </a>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- TABLA -->
    <div class="card shadow-lg border-0">

        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">💊 Inventario de Medicamentos</h4>
        </div>

        <div class="card-body">

            <table class="table table-hover table-striped text-center align-middle">

                <thead class="table-primary">

                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Categoría</th>

                    <th sec:authorize="hasRole('ADMIN')">
                        Acciones
                    </th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="m : ${medicamentos}">

                    <td th:text="${m.id}"></td>

                    <td th:text="${m.nombre}"></td>

                    <td th:text="${m.descripcion}"></td>

                    <td>
                        S/ <span th:text="${m.precio}"></span>
                    </td>

                    <td th:text="${m.stock}"></td>

                    <td th:text="${m.categoria}"></td>

                    <td sec:authorize="hasRole('ADMIN')">

                        <a th:href="@{'/editar/' + ${m.id}}"
                           class="btn btn-warning btn-sm">
                            ✏ Editar
                        </a>

                        <a th:href="@{'/eliminar/' + ${m.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Desea eliminar este medicamento?')">
                            🗑 Eliminar
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
