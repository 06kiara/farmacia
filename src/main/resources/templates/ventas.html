<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Módulo de Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-light">

<!-- ===================== NAVBAR ===================== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">

            <img src="/img/logo.png.jpg"
                 class="logo-navbar me-2"
                 alt="Logo">

            <span>Sistema de Farmacia</span>

        </a>

        <div class="d-flex align-items-center">

            <span class="text-white me-3">
                Bienvenido:
                <strong sec:authentication="name"></strong>
            </span>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-danger">
                    Cerrar sesión
                </button>
            </form>

        </div>

    </div>

</nav>

<!-- ===================== MENU ===================== -->

<div class="bg-white shadow-sm">

    <div class="container">

        <ul class="nav nav-pills py-3">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">
                    🏠 Inicio
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">
                    💊 Medicamentos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" th:href="@{/ventas}">
                    🛒 Ventas
                </a>
            </li>

        </ul>

    </div>

</div>

<!-- ===================== CONTENIDO ===================== -->

<div class="container mt-4">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-success text-white">

            <h3 class="mb-0">
                🛒 Registrar Nueva Venta
            </h3>

        </div>

        <div class="card-body">

            <!-- ===================== FORMULARIO ===================== -->

            <form th:action="@{/ventas/agregar}" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Medicamento
                        </label>

                        <select class="form-select"
                                name="medicamento"
                                required>

                            <option value="">
                                Seleccione un medicamento
                            </option>

                            <option
                                    th:each="m : ${medicamentos}"
                                    th:value="${m.id}"
                                    th:text="${m.nombre + ' - S/ ' + m.precio}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Cantidad
                        </label>

                        <input
                                type="number"
                                class="form-control"
                                name="cantidad"
                                value="1"
                                min="1"
                                required>

                    </div>

                    <div class="col-md-3 d-grid align-self-end">

                        <button
                                type="submit"
                                class="btn btn-primary">

                            ➕ Agregar al carrito

                        </button>

                    </div>

                </div>

            </form>

            <hr>

            <!-- ===================== CARRITO ===================== -->

            <h4 class="mb-3">

                🧾 Carrito de Compras

            </h4>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>Medicamento</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acción</th>

                </tr>

                </thead>

                <tbody>

                <!-- Si está vacío -->

                <tr th:if="${#lists.isEmpty(carrito)}">

                    <td colspan="5"
                        class="text-center text-muted">

                        No hay productos agregados.

                    </td>

                </tr>

                <!-- Productos -->

                <tr th:each="item : ${carrito}">

                    <td th:text="${item.medicamento.nombre}"></td>

                    <td th:text="'S/ ' + ${item.medicamento.precio}"></td>

                    <td th:text="${item.cantidad}"></td>

                    <td th:text="'S/ ' + ${item.subtotal}"></td>

                    <td>

                        <button
                                class="btn btn-danger btn-sm"
                                disabled>

                            Eliminar

                        </button>

                    </td>

                </tr>

                </tbody>

            </table>

            <div class="text-end">

                <h3>

                    Total:

                    <span class="text-success">

                        (Se calculará en el siguiente paso)

                    </span>

                </h3>

            </div>

            <div class="d-flex justify-content-between mt-4">

                <a
                        th:href="@{/}"
                        class="btn btn-secondary">

                    ← Volver

                </a>

                <button
                        class="btn btn-success"
                        disabled>

                    ✅ Confirmar Venta

                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
